<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Günlüğüm</title>
  <meta name="theme-color" content="#1a1a2e" />
  <link rel="manifest" href="manifest.json" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px;
      font-family: Georgia, 'Times New Roman', serif;
    }
    #app { width: 100%; max-width: 680px; }

    /* Header */
    .header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 24px;
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .header-icon { font-size: 26px; filter: drop-shadow(0 0 8px #e2b96f88); }
    .header-title { color: #e2b96f; font-size: 20px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; text-shadow: 0 0 20px #e2b96f55; }
    .header-right { display: flex; align-items: center; gap: 8px; }
    .note-count { color: #8899cc; font-size: 13px; }
    .cal-btn {
      background: transparent; border: 1px solid #e2b96f55; border-radius: 8px;
      color: #e2b96f; padding: 5px 12px; cursor: pointer; font-size: 13px;
      transition: background 0.2s; font-family: inherit;
    }
    .cal-btn:hover, .cal-btn.active { background: #e2b96f22; }

    /* Calendar */
    .calendar {
      background: #1a2540; border: 1px solid #e2b96f44; border-radius: 16px;
      padding: 20px; margin-bottom: 20px; box-shadow: 0 8px 32px #00000066;
      display: none;
    }
    .calendar.open { display: block; }
    .cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .cal-nav { background: none; border: none; color: #e2b96f; font-size: 20px; cursor: pointer; padding: 0 8px; }
    .cal-month-label { color: #e2b96f; font-weight: 600; font-size: 15px; font-family: inherit; }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
    .cal-day-name { text-align: center; color: #8899cc; font-size: 11px; padding-bottom: 4px; }
    .cal-day {
      background: transparent; border: 1px solid transparent; border-radius: 8px;
      color: #ccd6f6; padding: 6px 0; cursor: pointer; font-size: 13px;
      text-align: center; position: relative; transition: background 0.15s;
      font-family: inherit;
    }
    .cal-day:hover { background: #ffffff11; }
    .cal-day.today { border-color: #e2b96f88; background: #e2b96f22; }
    .cal-day.current { background: #e2b96f; color: #1a1a2e; font-weight: 700; border-color: transparent; }
    .cal-day .dot {
      position: absolute; bottom: 2px; left: 50%; transform: translateX(-50%);
      width: 4px; height: 4px; border-radius: 50%; background: #e2b96f;
    }
    .cal-empty { background: transparent; border: none; }

    /* Page wrapper */
    .page-wrapper { transition: opacity 0.2s ease, transform 0.22s ease; }
    .page-wrapper.hidden { opacity: 0; transform: translateX(60px) scale(0.97); }
    .page-wrapper.hidden-left { opacity: 0; transform: translateX(-60px) scale(0.97); }

    /* Paper */
    .paper {
      border-radius: 3px 16px 16px 3px;
      box-shadow: 0 4px 6px #00000033, 8px 0 16px #00000033, -4px 0 0 #b8a07844, inset 0 0 0 1px #c8b89822;
      min-height: 520px; display: flex; flex-direction: column; overflow: hidden; position: relative;
    }
    .binding {
      position: absolute; left: 0; top: 0; bottom: 0; width: 32px;
      background: linear-gradient(90deg, #b8860b33 0%, transparent 100%);
      border-right: 2px solid #c8a84488; pointer-events: none;
    }
    .ruled-lines {
      position: absolute; left: 40px; right: 0; top: 80px; bottom: 0;
      background-image: repeating-linear-gradient(transparent, transparent 31px, #00000011 31px, #00000011 32px);
      background-size: 100% 32px; pointer-events: none;
    }
    .paper-header {
      padding: 20px 24px 16px 48px;
      border-bottom: 2px solid #c8a84455;
      display: flex; align-items: center; justify-content: space-between;
    }
    .date-title { font-size: 22px; font-weight: 700; color: #5a3e28; letter-spacing: 0.5px; }
    .today-badge {
      font-size: 11px; color: #c8860b; font-style: italic;
      background: #c8860b22; padding: 1px 8px; border-radius: 10px;
      margin-top: 4px; display: inline-block;
    }
    .deco { font-size: 28px; opacity: 0.15; user-select: none; }
    textarea {
      flex: 1; min-height: 400px; background: transparent; border: none; outline: none;
      resize: none; padding: 20px 28px 20px 48px;
      font-size: 16px; line-height: 32px; color: #3a2a18;
      font-family: Georgia, serif; letter-spacing: 0.3px; z-index: 1; position: relative;
    }
    textarea::placeholder { color: #a08060; }
    .paper-footer {
      padding: 8px 24px 12px 48px;
      display: flex; gap: 16px; align-items: center;
      border-top: 1px solid #c8a84433;
      color: #a08060; font-size: 12px; font-style: italic;
    }
    .saved-label { margin-left: auto; color: #c8860b; }

    /* Navigation */
    .nav { display: flex; align-items: center; gap: 20px; margin-top: 28px; justify-content: center; }
    .nav-btn {
      background: #ffffff11; border: 1px solid #ffffff22; border-radius: 12px;
      color: #ccd6f6; padding: 10px 22px; cursor: pointer; font-size: 14px;
      transition: background 0.2s; font-family: inherit;
    }
    .nav-btn:hover:not(:disabled) { background: #ffffff22; }
    .nav-btn:disabled { color: #ffffff33; cursor: default; background: #ffffff05; }
    .today-btn {
      background: #ffffff11; border: 1px solid #e2b96f55; border-radius: 12px;
      color: #e2b96f; padding: 10px 18px; cursor: pointer; font-size: 13px; font-weight: 600;
      transition: all 0.2s; font-family: inherit;
    }
    .today-btn.active { background: #e2b96f; color: #1a1a2e; }
    .footer-note { color: #ffffff22; font-size: 12px; margin-top: 20px; font-style: italic; text-align: center; }

    @media (max-width: 480px) {
      body { padding: 16px 8px; }
      .date-title { font-size: 17px; }
      .nav-btn, .today-btn { padding: 9px 14px; font-size: 13px; }
    }
  </style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-left">
      <span class="header-icon">📔</span>
      <span class="header-title">Günlüğüm</span>
    </div>
    <div class="header-right">
      <span class="note-count" id="noteCount">0 günlük not</span>
      <button class="cal-btn" id="calBtn" onclick="toggleCalendar()">📅 Takvim</button>
    </div>
  </div>

  <div class="calendar" id="calendar">
    <div class="cal-header">
      <button class="cal-nav" onclick="changeCalMonth(-1)">‹</button>
      <span class="cal-month-label" id="calMonthLabel"></span>
      <button class="cal-nav" onclick="changeCalMonth(1)">›</button>
    </div>
    <div class="cal-grid" id="calGrid"></div>
  </div>

  <div class="page-wrapper" id="pageWrapper">
    <div class="paper" id="paper">
      <div class="binding"></div>
      <div class="ruled-lines"></div>
      <div class="paper-header">
        <div>
          <div class="date-title" id="dateTitle"></div>
          <span class="today-badge" id="todayBadge" style="display:none">Bugün</span>
        </div>
        <div class="deco">✦</div>
      </div>
      <textarea id="noteArea" placeholder="Bugün aklında ne var? Yaz..."></textarea>
      <div class="paper-footer">
        <span id="wordCount">0 kelime</span>
        <span>·</span>
        <span id="charCount">0 karakter</span>
        <span class="saved-label" id="savedLabel" style="display:none">✓ Kaydedildi</span>
      </div>
    </div>
  </div>

  <div class="nav">
    <button class="nav-btn" onclick="navigate(-1)">‹ Önceki</button>
    <button class="today-btn" id="todayBtn" onclick="goToday()">Bugün</button>
    <button class="nav-btn" id="nextBtn" onclick="navigate(1)">Sonraki ›</button>
  </div>

  <p class="footer-note">Notlar tarayıcında otomatik kaydedilir</p>
</div>

<script>
  const DAYS_TR = ["Pazar","Pazartesi","Salı","Çarşamba","Perşembe","Cuma","Cumartesi"];
  const MONTHS_TR = ["Ocak","Şubat","Mart","Nisan","Mayıs","Haziran","Temmuz","Ağustos","Eylül","Ekim","Kasım","Aralık"];
  const PAPER_COLORS = ["#fdf6e3","#fff8f0","#f0f7ff","#f3fef3","#fdf0ff","#fff0f0"];

  let notes = {};
  let currentDate = toDateStr(new Date());
  const today = toDateStr(new Date());
  let calMonth = { year: new Date().getFullYear(), month: new Date().getMonth() };
  let calOpen = false;
  let saveTimeout = null;

  function toDateStr(d) {
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  function addDays(dateStr, n) {
    const [y,m,d] = dateStr.split('-').map(Number);
    const date = new Date(y, m-1, d);
    date.setDate(date.getDate() + n);
    return toDateStr(date);
  }

  function formatDate(dateStr) {
    const [y,m,d] = dateStr.split('-').map(Number);
    const date = new Date(y, m-1, d);
    return `${DAYS_TR[date.getDay()]}, ${d} ${MONTHS_TR[m-1]} ${y}`;
  }

  function getPaperColor(dateStr) {
    let hash = 0;
    for (let i = 0; i < dateStr.length; i++) hash = (hash * 31 + dateStr.charCodeAt(i)) | 0;
    return PAPER_COLORS[Math.abs(hash) % PAPER_COLORS.length];
  }

  function loadNotes() {
    try { notes = JSON.parse(localStorage.getItem('daily-notes-v1') || '{}'); } catch(e) { notes = {}; }
  }

  function saveNote(text) {
    notes[currentDate] = text;
    localStorage.setItem('daily-notes-v1', JSON.stringify(notes));
    updateNoteCount();
  }

  function renderPage() {
    const paper = document.getElementById('paper');
    paper.style.background = getPaperColor(currentDate);
    document.getElementById('dateTitle').textContent = formatDate(currentDate);
    document.getElementById('todayBadge').style.display = currentDate === today ? 'inline-block' : 'none';
    document.getElementById('todayBtn').className = 'today-btn' + (currentDate === today ? ' active' : '');
    document.getElementById('nextBtn').disabled = currentDate >= today;
    const ta = document.getElementById('noteArea');
    ta.value = notes[currentDate] || '';
    updateStats(ta.value);
    ta.focus();
  }

  function updateStats(text) {
    const words = text.trim() ? text.trim().split(/\s+/).length : 0;
    document.getElementById('wordCount').textContent = words + ' kelime';
    document.getElementById('charCount').textContent = text.length + ' karakter';
    document.getElementById('savedLabel').style.display = text.trim() ? 'inline' : 'none';
  }

  function updateNoteCount() {
    const count = Object.values(notes).filter(v => v && v.trim()).length;
    document.getElementById('noteCount').textContent = count + ' günlük not';
  }

  function navigate(dir) {
    const wrapper = document.getElementById('pageWrapper');
    wrapper.className = 'page-wrapper ' + (dir === 1 ? 'hidden' : 'hidden-left');
    setTimeout(() => {
      currentDate = addDays(currentDate, dir);
      renderPage();
      if (calOpen) renderCalendar();
      wrapper.className = 'page-wrapper';
    }, 220);
  }

  function goToday() {
    if (currentDate === today) return;
    const dir = currentDate < today ? 1 : -1;
    const wrapper = document.getElementById('pageWrapper');
    wrapper.className = 'page-wrapper ' + (dir === 1 ? 'hidden' : 'hidden-left');
    setTimeout(() => {
      currentDate = today;
      renderPage();
      if (calOpen) renderCalendar();
      wrapper.className = 'page-wrapper';
    }, 220);
  }

  function toggleCalendar() {
    calOpen = !calOpen;
    document.getElementById('calendar').className = 'calendar' + (calOpen ? ' open' : '');
    document.getElementById('calBtn').className = 'cal-btn' + (calOpen ? ' active' : '');
    if (calOpen) {
      calMonth = { year: new Date().getFullYear(), month: new Date().getMonth() };
      renderCalendar();
    }
  }

  function changeCalMonth(dir) {
    const d = new Date(calMonth.year, calMonth.month + dir);
    calMonth = { year: d.getFullYear(), month: d.getMonth() };
    renderCalendar();
  }

  function renderCalendar() {
    document.getElementById('calMonthLabel').textContent = `${MONTHS_TR[calMonth.month]} ${calMonth.year}`;
    const grid = document.getElementById('calGrid');
    grid.innerHTML = '';
    ['Pz','Pt','Sa','Ça','Pe','Cu','Ct'].forEach(d => {
      const el = document.createElement('div');
      el.className = 'cal-day-name';
      el.textContent = d;
      grid.appendChild(el);
    });
    const first = new Date(calMonth.year, calMonth.month, 1).getDay();
    const total = new Date(calMonth.year, calMonth.month + 1, 0).getDate();
    for (let i = 0; i < first; i++) {
      const el = document.createElement('div');
      grid.appendChild(el);
    }
    for (let d = 1; d <= total; d++) {
      const str = `${calMonth.year}-${String(calMonth.month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const btn = document.createElement('button');
      let cls = 'cal-day';
      if (str === currentDate) cls += ' current';
      else if (str === today) cls += ' today';
      btn.className = cls;
      btn.textContent = d;
      if (notes[str] && notes[str].trim() && str !== currentDate) {
        const dot = document.createElement('span');
        dot.className = 'dot';
        btn.appendChild(dot);
      }
      btn.onclick = () => {
        const wrapper = document.getElementById('pageWrapper');
        const dir = str >= currentDate ? 1 : -1;
        wrapper.className = 'page-wrapper ' + (dir === 1 ? 'hidden' : 'hidden-left');
        setTimeout(() => {
          currentDate = str;
          renderPage();
          renderCalendar();
          wrapper.className = 'page-wrapper';
        }, 220);
        toggleCalendar();
      };
      grid.appendChild(btn);
    }
  }

  document.getElementById('noteArea').addEventListener('input', function() {
    updateStats(this.value);
    clearTimeout(saveTimeout);
    saveTimeout = setTimeout(() => saveNote(this.value), 400);
  });

  loadNotes();
  renderPage();
  updateNoteCount();
</script>
</body>
</html>
